<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Interactive Perceptual Hailstone — Step 4-1</title>
    <meta name="description" content="Step 4-1 hailstone realism reinforcement prototype." />
    <style>
      :root {
        --bg: #23272b;
        --fg: rgba(236, 242, 248, 0.88);
        --muted: rgba(236, 242, 248, 0.52);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.045), rgba(35, 39, 43, 0) 42%),
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.012), rgba(35, 39, 43, 0) 72%),
          var(--bg);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hint {
        position: fixed;
        left: 50%;
        bottom: clamp(18px, 4vw, 34px);
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(15, 18, 21, 0.24);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        line-height: 1;
        letter-spacing: 0.04em;
        color: var(--muted);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        pointer-events: none;
        user-select: none;
        opacity: 1;
        transition: opacity 800ms ease;
      }

      .hint.is-hidden {
        opacity: 0;
      }

      .loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: rgba(236, 242, 248, 0.64);
        pointer-events: none;
        transition: opacity 500ms ease;
        background: radial-gradient(circle at center, rgba(255, 255, 255, 0.02), rgba(35, 39, 43, 0) 45%);
      }

      .loading.is-hidden {
        opacity: 0;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/addons/": "./vendor/addons/"
        }
      }
    </script>
  </head>
  <body>
    <div id="loading" class="loading">INITIALIZING HAILSTONE</div>
    <div id="hint" class="hint">drag / touch to rotate</div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
